name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare scripts
        run: |
          chmod +x bin/php-iv-core
          chmod +x tests/run.sh

      - name: Run test suite
        run: ./tests/run.sh
